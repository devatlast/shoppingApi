info:
  name: Filter Orders
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/orders?status=pending
  params:
    - name: status
      value: pending
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: "{{baseUrl}}/orders?status=paid"
      method: GET
      params:
        - name: status
          value: paid
          type: query
