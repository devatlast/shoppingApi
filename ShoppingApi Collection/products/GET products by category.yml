info:
  name: GET products by category
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/products?category=kitchen
  params:
    - name: category
      value: kitchen
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: GET products by category
    request:
      url: "{{baseUrl}}/products?category=computer"
      method: GET
      params:
        - name: category
          value: computer
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: X-Powered-By
          value: tinyhttp
        - name: Content-Type
          value: application/json
        - name: Date
          value: Wed, 03 Jun 2026 08:11:48 GMT
        - name: Connection
          value: keep-alive
        - name: Keep-Alive
          value: timeout=5
        - name: Content-Length
          value: "277"
      body:
        type: json
        data: |-
          [
              {
                  "id": "1",
                  "name": "mouse",
                  "category": "computer",
                  "price": 6000
              },
              {
                  "id": "2",
                  "name": "keyboard",
                  "category": "computer",
                  "price": 12000
              },
              {
                  "id": "5",
                  "name": "usb",
                  "category": "computer",
                  "price": 3000
              }
          ]
