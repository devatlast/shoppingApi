info:
  name: GET products by id
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:3000/products/2
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: GET products by id
    request:
      url: "{{baseUrl}}/products/2"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: X-Powered-By
          value: tinyhttp
        - name: Content-Type
          value: application/json
        - name: Date
          value: Wed, 03 Jun 2026 08:13:51 GMT
        - name: Connection
          value: keep-alive
        - name: Keep-Alive
          value: timeout=5
        - name: Content-Length
          value: "81"
      body:
        type: json
        data: |-
          {
              "id": "2",
              "name": "keyboard",
              "category": "computer",
              "price": 12000
          }
