info:
  name: Filter Payments
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/payments?method=bank_transfer
  params:
    - name: method
      value: bank_transfer
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: "{{baseUrl}}/payments?method=card"
      method: GET
      params:
        - name: method
          value: card
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: X-Powered-By
          value: tinyhttp
        - name: Content-Type
          value: application/json
        - name: Date
          value: Wed, 03 Jun 2026 09:06:43 GMT
        - name: Connection
          value: keep-alive
        - name: Keep-Alive
          value: timeout=5
        - name: Content-Length
          value: "219"
      body:
        type: json
        data: |-
          [
              {
                  "id": "1",
                  "orderId": 3,
                  "amount": 15000,
                  "method": "card",
                  "status": "success"
              },
              {
                  "id": "4",
                  "orderId": 4,
                  "amount": 10000,
                  "method": "card",
                  "status": "failed"
              }
          ]
