          value: GET, HEAD, PUT, PATCH, POST, DELETE
        - name: Access-Control-Allow-Headers
          value: content-type
        - name: Content-Type
          value: application/json
        - name: Date
          value: Wed, 03 Jun 2026 08:40:49 GMT
        - name: Connection
          value: keep-alive
        - name: Keep-Alive
          value: timeout=5
